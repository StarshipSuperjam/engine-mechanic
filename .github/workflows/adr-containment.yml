# adr-containment — product-territory guardrail, deliberately NOT an engine check.
#
# This repository's product decision records (docs/adr/, ADR-#### numbering, plus the
# retired D-### numbering they replace) are deployment-local: nothing that travels to
# engine-template — a contribution, an issue, a pull request — may reference them, because
# a deployed repo keeps its own product ADR system and a foreign decision number reads as
# one of its own. The engine's eADR-#### records are a separate system, never flagged.
#
# Why a product workflow and not an engine check: an engine module on disk but absent from
# engine.json packages fails release-integrity; one listed in packages makes every engine
# upgrade refuse. Product territory is untouched by engine upgrades by contract (the
# engine/product wall), and this file sits under the engine weakening-guard's watched
# .github/workflows/ prefix, so editing or deleting it trips that alarm on any pull request.
# The rule and its survival story: .engine/contracts/instance/engine-mechanic-eADR-0001.
#
# ADVISORY at the merge (not in the branch ruleset's required-check list) — a red run is
# surfaced on the pull request for the operator to weigh; the review gate stays the wall.
# One honest bound: this workflow runs the scanner from the pull request's own copy of
# tools/adr-containment/, and nothing mechanical alarms an edit to that directory — a PR
# touching it is itself a guardrail change and must be read as such at review.

name: adr-containment

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read

jobs:
  adr-containment:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out the tree
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Containment scan over the tracked tree
        run: python3 tools/adr-containment/check.py tree

      - name: Disposition-map completeness (every retired decision, exactly once)
        run: python3 tools/adr-containment/check.py map

      - name: Scanner falsification (each scanner must bite its seeded-bad input)
        run: python3 tools/adr-containment/check.py demo

      - name: Self-tests
        run: python3 -m unittest discover -s tools/adr-containment -p 'test_*.py' -b
